<div class="case-study-card">
  <div class="case-study-meta">
    <span class="case-study-industry">{{ include.study.industry }}</span>
  </div>
  <h3 class="case-study-title">{{ include.study.title }}</h3>
  <p class="case-study-summary">{{ include.study.summary }}</p>
  <a href="{{ include.study.url | relative_url }}" class="btn btn-outline btn-sm">Read Case Study &rarr;</a>
</div>
