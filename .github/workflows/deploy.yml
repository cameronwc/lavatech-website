name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Validate HTML
        run: |
          bundle exec htmlproofer _site \
            --ignore-urls "/facebook.com/,/instagram.com/,/linkedin.com/,/formspree.io/,/maps.google.com/,/googletagmanager.com/,/fonts.googleapis.com/,/fonts.gstatic.com/" \
            --ignore-status-codes "999,403,429" \
            --no-enforce-https \
            --allow-missing-href \
            --swap-urls "^https\://lavatech\.solutions:" \
            --checks Links,Images,Scripts

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
